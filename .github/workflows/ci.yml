name: CI

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      # No package-lock.json is committed, so use `npm install` (not `npm ci`).
      # The protocol tests rely only on the Web Crypto API, but we install the
      # server's dependencies so the workflow matches a real checkout.
      - name: Install dependencies
        run: npm install

      - name: Run protocol & security tests
        run: npm test
